# fly.toml app configuration file for the CodeRocket builder
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'coderocket-builder'
primary_region = 'den'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 2

[mounts]
  source = "default"
  destination = "/mnt"
  initial_size = "5gb"
